name: PR Sanity Check

on:
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"

jobs:
  sanity:
    name: Full Sanity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Full Sanity Check (with Git)
        run: npm run sanity
